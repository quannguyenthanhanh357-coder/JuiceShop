# Project Sentinel — giả lập deploy staging trên localhost
# Nhanh (image pin cùng version):  docker compose up -d
# Build từ source (Tuần 7 sửa code): docker compose up -d --build
# Juice Shop (debug/ZAP): http://localhost:3000
# Kong gateway (agent traffic): http://localhost:8000

services:
  juice-shop:
    image: bkimminich/juice-shop:v20.1.1
    build:
      context: ./juice-shop
    container_name: sentinel-juice-shop
    # Giữ 3000 cho ZAP/debug; production-like: agent chỉ gọi qua Kong :8000
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - sentinel-net

  # Kong DB-less (declarative) — Tuần 2 IAM cho agent
  kong:
    image: kong:3.6
    container_name: sentinel-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    depends_on:
      - juice-shop
    restart: unless-stopped
    networks:
      - sentinel-net

  # Tuỳ chọn Tuần 3+: Chroma vector DB (bỏ comment nếu muốn service riêng)
  # chroma:
  #   image: chromadb/chroma:latest
  #   container_name: sentinel-chroma
  #   ports:
  #     - "8002:8000"
  #   volumes:
  #     - chroma-data:/chroma/chroma
  #   networks:
  #     - sentinel-net

networks:
  sentinel-net:
    name: sentinel-net
    driver: bridge

