name: Security Scan (SAST & DAST)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sast-semgrep:
    runs-on: ubuntu-latest
    name: Semgrep SAST
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Clone source code Juice Shop để Semgrep có code để quét 
      # (vì hiện tại repo rỗng chỉ có README)
      - name: Clone OWASP Juice Shop source code
        run: git clone https://github.com/juice-shop/juice-shop.git juice-shop-src
        
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
          # Quét vào thư mục chứa code Juice Shop
          # Generate kết quả dạng json để sau này thu thập (Bước 4)
          generateJobSummary: false
        env:
          SEMGREP_RULES: p/default
        # Note: Thực tế Semgrep action tự động quét thư mục hiện tại.
        # Ở đây ta clone code vào để nó tự động phát hiện và quét.

  dast-zap:
    runs-on: ubuntu-latest
    name: OWASP ZAP DAST
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Triển khai Juice Shop lên một container giả lập môi trường Staging ngay trong GitHub Actions
      - name: Run Juice Shop Container
        run: |
          docker run -d -p 3000:3000 bkimminich/juice-shop
          echo "Waiting for Juice Shop to start..."
          sleep 15
        
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          # Không chặn (fail) pipeline nếu phát hiện lỗi, vì Juice Shop chắc chắn có nhiều lỗi
          fail_action: false 
          # Lưu report kết quả
          format: json
          cmd_options: '-J zap-report.json'
          
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: zap-report.json
