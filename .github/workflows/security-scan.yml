name: Security Scan (SAST & DAST)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sast-semgrep:
    runs-on: ubuntu-latest
    name: Semgrep SAST
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install and Run Semgrep SAST
        run: |
          pip install semgrep
          # Quét source Juice Shop đã clone trong repo (không clone lại)
          semgrep scan --config=p/default --json -o semgrep-report.json juice-shop || true

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-scan-report
          path: semgrep-report.json

      - name: Store report in data-lake path
        run: |
          mkdir -p data-lake/reports
          cp semgrep-report.json data-lake/reports/semgrep-report.json

      - name: Upload data-lake Semgrep copy
        uses: actions/upload-artifact@v4
        with:
          name: data-lake-semgrep
          path: data-lake/reports/semgrep-report.json

  dast-zap:
    runs-on: ubuntu-latest
    name: OWASP ZAP DAST
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # CI dùng image cùng version với pin (nhanh hơn build source).
      # Local deploy giả lập: docker compose up --build (build từ ./juice-shop).
      - name: Run Juice Shop (pinned version)
        run: |
          docker run -d --name juice-shop -p 3000:3000 bkimminich/juice-shop:v20.1.1
          echo "Waiting for Juice Shop..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/rest/admin/application-version >/dev/null; then
              echo "Juice Shop is up"
              exit 0
            fi
            sleep 2
          done
          echo "Juice Shop failed to start"
          docker logs juice-shop
          exit 1

      # action-baseline tự ghi report_json.json / report_md.md / report_html.html
      # vào workspace (mount /zap/wrk) và upload artifact — không có input `format`,
      # không cần -J riêng (đã hardcode -J report_json.json trong action).
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-scan-report

      # Chuẩn hoá tên file cho scripts/parse_results.py (--zap zap-report.json)
      - name: Normalize ZAP JSON report
        run: |
          if [ ! -f report_json.json ]; then
            echo "ZAP report_json.json missing after scan"
            ls -la
            exit 1
          fi
          cp report_json.json zap-report.json
          mkdir -p data-lake/reports
          cp report_json.json data-lake/reports/zap-report.json
          ls -la report_json.json zap-report.json data-lake/reports/zap-report.json

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report-json
          path: |
            zap-report.json
            data-lake/reports/zap-report.json
