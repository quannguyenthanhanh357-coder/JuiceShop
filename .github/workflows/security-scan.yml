name: Security Scan (SAST & DAST)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sast-semgrep:
    runs-on: ubuntu-latest
    name: Semgrep SAST
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Clone source code Juice Shop để Semgrep có code để quét 
      # (vì hiện tại repo rỗng chỉ có README)
      - name: Clone OWASP Juice Shop source code
        run: git clone https://github.com/juice-shop/juice-shop.git juice-shop-src
        
      - name: Install and Run Semgrep SAST
        run: |
          pip install semgrep
          semgrep scan --config=p/default --json -o semgrep-report.json juice-shop-src || true
        

        
      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-scan-report
          path: semgrep-report.json

  dast-zap:
    runs-on: ubuntu-latest
    name: OWASP ZAP DAST
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Triển khai Juice Shop lên một container giả lập môi trường Staging ngay trong GitHub Actions
      - name: Run Juice Shop Container
        run: |
          docker run -d -p 3000:3000 bkimminich/juice-shop
          echo "Waiting for Juice Shop to start..."
          sleep 15
        
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          # Không chặn (fail) pipeline nếu phát hiện lỗi, vì Juice Shop chắc chắn có nhiều lỗi
          fail_action: false 
          # Lưu report kết quả
          format: json
          cmd_options: '-J zap-report.json'
          
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: zap-report.json
